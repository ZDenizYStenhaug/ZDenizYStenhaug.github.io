# Configs for pwills.com

title: "Deniz y. Stenhaug"
name: "Deniz Y. Stenhaug"
email: stenhaugdeniz@gmail.com
url: "https://zdenizystenhaug.github.io/"
repository: "ZDenizYStenhaug/ZDenizYStenhaug.github.io"

include:
  - _pages
  - assets
  - index.html
exclude:
  - TODO.md
  - README.md
  - "*.org"
  - "*ltximg*"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

# Build settings
markdown: kramdown
# theme: minimal-mistakes-jekyll
theme: jekyll-theme-time-machine
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dirt"

# # comments by disqus
comments:
  provider: "disqus"
  disqus:
    shortname: "pwills-com"


# pagination for blog page
paginate: 10 # number of posts to show
paginate_path: /page:num/

# default YAML front matter
defaults:
  # all
  - scope:
      path: ""
    values:
      layout: single
      mathjax: true
      author_profile: true
      class: wide
      title: " "
      title_separator: "|"
  # posts
  - scope:
      type: posts
    values:
      toc: true
      toc_label: "Contents"
      read_time: false
      comments: true
  # portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      author_profile: false
      excerpt: ""
      sidebar:
        nav: "portfolio"

# collections
collections:
  portfolio:
    output: true
